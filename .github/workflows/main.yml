name: CI/CD Pipeline - Integração e Testes
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar Build e Testes
        run: mvn clean verify -Dheadless=true

      - name: Upload Relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-cobertura
          path: target/site/jacoco/
          retention-days: 5

      - name: Upload Logs de Erro (Surefire)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports
          path: target/surefire-reports/