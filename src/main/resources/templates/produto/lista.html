<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: menu}"></div>

<div class="container pb-5">

    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show shadow-sm border-0" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensagemSucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-dark fw-bold">Lista de Produtos</h2>
        <a href="/produtos/novo" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-lg"></i> Cadastrar Novo
        </a>
    </div>

    <div class="table-wrapper">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th class="ps-4">ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th class="text-end pe-4">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${produtos}">
                <td class="ps-4 text-muted" th:text="${'#' + p.id}"></td>
                <td class="fw-medium text-dark" th:text="${p.nome}"></td>
                <td th:text="${p.descricao}"></td>
                <td>
                    <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 px-2 py-1"
                          th:text="${#numbers.formatCurrency(p.preco)}"></span>
                </td>
                <td>
                    <span class="badge px-2 py-1"
                          th:classappend="${p.quantidadeEstoque < 5} ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25' : 'bg-info bg-opacity-10 text-info border border-info border-opacity-25'"
                          th:text="${p.quantidadeEstoque + ' un'}"></span>
                </td>
                <td class="text-end pe-4">
                    <a th:href="@{/produtos/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-secondary me-1" title="Editar">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a th:href="@{/produtos/excluir/{id}(id=${p.id})}"
                       class="btn btn-sm btn-outline-danger" title="Excluir"
                       onclick="return confirm('Tem certeza que deseja excluir este produto permanentemente?')">
                        <i class="bi bi-trash3"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(produtos)}">
                <td colspan="6" class="text-center py-5">
                    <div class="text-muted">
                        <i class="bi bi-box-seam fs-1 d-block mb-3"></i>
                        <h5>Nenhum produto encontrado</h5>
                        <p class="mb-0">Clique no botão "Cadastrar Novo" para começar.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
