<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: menu}"></div>

<div class="container pb-5">

    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show shadow-sm border-0"
         role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${mensagemSucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 mb-0 text-dark fw-bold">Lista de Clientes</h2>
        <a href="/clientes/novo" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-lg"></i> Cadastrar Novo
        </a>
    </div>

    <div class="table-wrapper">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th class="ps-4">ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Crédito</th>
                <th class="text-end pe-4">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${clientes}">
                <td class="ps-4 text-muted" th:text="${'#' + c.id}"></td>
                <td class="fw-medium text-dark" th:text="${c.nome}"></td>
                <td th:text="${c.email}"></td>
                <td>
                    <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1"
                          th:text="${#numbers.formatCurrency(c.limiteCredito)}"></span>
                </td>
                <td class="text-end pe-4">
                    <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn btn-sm btn-outline-secondary me-1"
                       title="Editar">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a th:href="@{/clientes/excluir/{id}(id=${c.id})}"
                       class="btn btn-sm btn-outline-danger" title="Excluir"
                       onclick="return confirm('Tem certeza que deseja excluir este cliente permanentemente?')">
                        <i class="bi bi-trash3"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clientes)}">
                <td colspan="5" class="text-center py-5">
                    <div class="text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                        <h5>Nenhum cliente encontrado</h5>
                        <p class="mb-0">Clique no botão "Cadastrar Novo" para começar.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
