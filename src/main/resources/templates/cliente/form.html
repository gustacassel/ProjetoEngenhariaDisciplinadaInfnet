<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<div th:replace="~{layout :: menu}"></div>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">

                <div class="card-header bg-white border-bottom py-3 d-flex align-items-center">
                    <i class="bi bi-person-lines-fill fs-4 text-primary me-2"></i>
                    <h4 class="mb-0 fw-bold" th:text="${cliente.id == null ? 'Novo Cliente' : 'Editar Cliente'}"></h4>
                </div>

                <div class="card-body p-4">

                    <div th:if="${erroNegocio}" class="alert alert-danger d-flex align-items-center border-0 shadow-sm"
                         role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <div th:text="${erroNegocio}"></div>
                    </div>

                    <form th:action="@{/clientes/salvar}" th:object="${cliente}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-4">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: João da Silva"
                                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
                            <div class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">E-mail</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                <input type="email" th:field="*{email}" class="form-control"
                                       placeholder="joao@email.com"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                            </div>
                            <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label">Data de Nascimento</label>
                                <input type="date" th:field="*{dataNascimento}" class="form-control"
                                       th:classappend="${#fields.hasErrors('dataNascimento')} ? 'is-invalid'">
                                <div class="error-message" th:if="${#fields.hasErrors('dataNascimento')}"
                                     th:errors="*{dataNascimento}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Limite de Crédito</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light">R$</span>
                                    <input type="number" step="0.01" th:field="*{limiteCredito}" class="form-control"
                                           placeholder="0,00"
                                           th:classappend="${#fields.hasErrors('limiteCredito')} ? 'is-invalid'">
                                </div>
                                <div class="error-message" th:if="${#fields.hasErrors('limiteCredito')}"
                                     th:errors="*{limiteCredito}"></div>
                            </div>
                        </div>

                        <hr class="text-muted my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a href="/clientes" class="btn btn-light border">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-lg"></i> Salvar Cliente
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
