<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página Não Encontrada - 404</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: #6c757d;
        }
    </style>
</head>
<body class="bg-light">

<div class="container error-container text-center">
    <div class="card shadow p-5">
        <div class="error-code">404</div>
        <h1 class="display-5 mb-4">Página Não Encontrada</h1>

        <p class="lead text-muted mb-4"
           th:text="${errorMessage != null ? errorMessage : 'O recurso que você está procurando não existe ou foi movido.'}">
            Ops! O cliente ou a página solicitada não foi encontrado.
        </p>

        <div class="d-grid gap-2 d-md-block">
            <a href="/clientes" class="btn btn-primary btn-lg">
                Voltar para a Lista
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary btn-lg">
                Página Anterior
            </button>
        </div>
    </div>
</div>

</body>
</html>
